agent: our
tasks: all
exp_id: rvt2_ccf
bs: 24
epochs: 100
num_workers: 4
sample_distribution_mode: task_uniform
train_iter: 160000

peract:
  lambda_weight_l2: 0.000001
  lr: 0.000025
  optimizer_type: lamb
  warmup_steps: 2000
  lr_cos_dec: True
  add_rgc_loss: True
  num_rotation_classes: 72
  amp: True
  bnb: True
  transform_augmentation: True
  transform_augmentation_xyz: [0.125, 0.125, 0.125]
  transform_augmentation_rpy: [0.0, 0.0, 45.0]

rvt:
  gt_hm_sigma: 1.5
  img_aug: 0.1
  place_with_mean: True
  move_pc_in_bound: True

ccf:
  enabled: True
  num_train_candidates: 32
  num_infer_candidates: 64
  train_trans_sigma: 0.035
  infer_trans_sigma: 0.020
  success_radius: 0.010
  collision_radius: 0.006
  max_pc_points: 4096
  success_loss_weight: 1.0
  collision_loss_weight: 0.5
  residual_loss_weight: 1.0
  total_loss_weight: 0.2
  infer_collision_penalty: 0.7
  max_residual: 0.025