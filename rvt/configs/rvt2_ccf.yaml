agent: our
tasks: all
exp_id: rvt2_ccf_paper
bs: 24
epochs: 100
num_workers: 4
sample_distribution_mode: task_uniform
train_iter: 160000

peract:
  lambda_weight_l2: 0.000001
  lr: 0.000025
  optimizer_type: lamb
  warmup_steps: 2000
  lr_cos_dec: True
  add_rgc_loss: True
  num_rotation_classes: 72
  amp: True
  bnb: True
  transform_augmentation: True
  transform_augmentation_xyz: [0.125, 0.125, 0.125]
  transform_augmentation_rpy: [0.0, 0.0, 45.0]

rvt:
  gt_hm_sigma: 1.5
  img_aug: 0.1
  place_with_mean: True
  move_pc_in_bound: True

ccf:
  enabled: True

  num_train_candidates: 64
  num_infer_candidates: 128

  train_trans_sigma: 0.035
  infer_trans_sigma: 0.020
  train_rot_sigma_deg: 12.0
  infer_rot_sigma_deg: 8.0

  success_radius: 0.010
  success_rot_deg: 5.0
  contact_radius: 0.020
  collision_radius: 0.006

  max_pc_points: 4096

  success_loss_weight: 1.0
  contact_loss_weight: 0.5
  collision_loss_weight: 1.0
  residual_xyz_loss_weight: 1.0
  residual_rot_loss_weight: 0.25
  total_loss_weight: 0.2

  infer_contact_bonus: 0.25
  infer_collision_penalty: 1.0
  infer_residual_penalty: 0.05
  max_residual_xyz: 0.025
  max_residual_rot_deg: 5.0

  gripper_jaw_width: 0.080
  gripper_finger_length: 0.060
  gripper_finger_thickness: 0.012
  gripper_palm_depth: 0.020
  gripper_points_per_finger: 8
  gripper_points_on_palm: 8

  refine_position: True
  refine_rotation: True